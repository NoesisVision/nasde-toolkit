name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_to_prod:
        description: "Publish to production PyPI (default: TestPyPI only — safer dry-run)"
        type: boolean
        default: false
  schedule:
    # Weekly canary on Mondays 09:00 UTC. Re-publishes a fresh dev build
    # to TestPyPI and runs smoke-test-testpypi against it. Catches
    # transitive-dependency breakages (e.g. an upstream wheel going bad)
    # in the window between our own releases. Never reaches PyPI.
    - cron: "0 9 * * 1"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  quality-gate:
    name: Quality gate
    uses: ./.github/workflows/quality-gate.yml
    permissions:
      contents: read

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Extract built version
        id: extract-version
        run: |
          set -euo pipefail
          wheel=$(ls dist/nasde_toolkit-*.whl)
          version=$(basename "$wheel" | sed -E 's/^nasde_toolkit-([^-]+)-.*\.whl$/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Built version: $version"

      - name: Verify built version matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          built_version="${{ steps.extract-version.outputs.version }}"
          if [ "$tag_version" != "$built_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME → expected version $tag_version, hatch-vcs produced $built_version"
            exit 1
          fi
          echo "Built version $built_version matches tag $GITHUB_REF_NAME"

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, smoke-test-testpypi]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_to_prod)
    environment:
      name: pypi
      url: https://pypi.org/project/nasde-toolkit/
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Verify tag is on main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Reject tag not reachable from main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME (commit $GITHUB_SHA) is not reachable from main — refusing to publish to PyPI"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME confirmed on main"

      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/project/nasde-toolkit/
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  smoke-test-testpypi:
    name: Smoke-test fresh install from TestPyPI
    runs-on: ${{ matrix.os }}
    needs: [build, publish-testpypi]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13"]
    steps:
      - name: Wait for TestPyPI index propagation
        shell: bash
        run: sleep 30

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Fresh install from TestPyPI via uv tool install
        shell: bash
        run: |
          set -euo pipefail
          # Smoke test pulls `nasde-toolkit==X.Y.Z` from TestPyPI plus transitive
          # deps (harbor[cloud], opik, tensorlake, ...) from PyPI. uv's default
          # `first-index` resolution refuses to look on a fallback index once
          # *any* matching package name appears on the primary one — even if
          # the version there can't satisfy the requirement. That breaks both
          # directions:
          #   - PyPI primary: nasde-toolkit==0.3.3 not on PyPI yet, but 0.3.2
          #     is, so uv refuses to look at TestPyPI for 0.3.3.
          #   - TestPyPI primary: tensorlake==0.4.45 only on PyPI, but TestPyPI
          #     has unrelated devN uploads of tensorlake, so uv refuses to look
          #     at PyPI for 0.4.45.
          # `unsafe-best-match` tells uv to consider all indexes for every
          # package and pick the version that satisfies the requirement,
          # regardless of which index found it first. Safe for us because we
          # control both indexes and the package set is fixed by pyproject.toml.
          uv tool install \
            --python ${{ matrix.python }} \
            --refresh \
            --index-strategy unsafe-best-match \
            --index https://test.pypi.org/simple/ \
            --index https://pypi.org/simple/ \
            "nasde-toolkit==${{ needs.build.outputs.version }}"

      - name: Verify CLI smoke test
        shell: bash
        env:
          CI: "true"
        run: |
          set -euo pipefail
          nasde --version
          nasde --help

  smoke-test-pypi:
    name: Smoke-test fresh install from PyPI
    runs-on: ${{ matrix.os }}
    needs: [build, publish-pypi]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_to_prod)
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13"]
    steps:
      - name: Wait for PyPI index propagation
        shell: bash
        run: sleep 30

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Fresh install from PyPI via uv tool install
        shell: bash
        run: |
          set -euo pipefail
          uv tool install \
            --python ${{ matrix.python }} \
            --refresh \
            "nasde-toolkit==${{ needs.build.outputs.version }}"

      - name: Verify CLI smoke test
        shell: bash
        env:
          CI: "true"
        run: |
          set -euo pipefail
          nasde --version
          nasde --help
