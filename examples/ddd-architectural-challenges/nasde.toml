[project]
name = "ddd-architectural-challenges"
version = "1.0.0"

[defaults]
variant = "claude-vanilla"

[docker]
base_image = "ubuntu:22.04"
build_commands = []

[evaluation]
model = "claude-opus-4-7"
dimensions_file = "assessment_dimensions.json"
skills_dir = "./evaluator_skills"
max_turns = 60  # = current default; explicit here as a reminder DDD-rich workspaces need headroom

[reporting]
platform = "opik"
project_name = "ddd-architectural-challenges"
