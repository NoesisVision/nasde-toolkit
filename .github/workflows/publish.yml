name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      test_pypi:
        description: "Publish to TestPyPI instead of PyPI"
        type: boolean
        default: true
  schedule:
    # Weekly canary on Mondays 09:00 UTC. Equivalent to a manual
    # workflow_dispatch with test_pypi=true: re-publishes a fresh dev
    # build to TestPyPI and runs smoke-test-testpypi against it. Catches
    # transitive-dependency breakages (e.g. an upstream wheel going bad)
    # in the window between our own releases.
    - cron: "0 9 * * 1"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  quality-gate:
    name: Quality gate
    uses: ./.github/workflows/quality-gate.yml
    permissions:
      contents: read

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Extract built version
        id: extract-version
        run: |
          set -euo pipefail
          wheel=$(ls dist/nasde_toolkit-*.whl)
          version=$(basename "$wheel" | sed -E 's/^nasde_toolkit-([^-]+)-.*\.whl$/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Built version: $version"

      - name: Verify built version matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          built_version="${{ steps.extract-version.outputs.version }}"
          if [ "$tag_version" != "$built_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME → expected version $tag_version, hatch-vcs produced $built_version"
            exit 1
          fi
          echo "Built version $built_version matches tag $GITHUB_REF_NAME"

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/nasde-toolkit/
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.test_pypi)
    environment:
      name: testpypi
      url: https://test.pypi.org/project/nasde-toolkit/
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  smoke-test-testpypi:
    name: Smoke-test fresh install from TestPyPI
    runs-on: ubuntu-latest
    needs: [build, publish-testpypi]
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.test_pypi)
    permissions:
      contents: read
    steps:
      - name: Wait for TestPyPI index propagation
        run: sleep 30

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Fresh install from TestPyPI in clean venv
        run: |
          set -euo pipefail
          uv venv --python 3.12 /tmp/smoke
          VIRTUAL_ENV=/tmp/smoke uv pip install \
            --refresh \
            --index https://pypi.org/simple/ \
            --index https://test.pypi.org/simple/ \
            "nasde-toolkit==${{ needs.build.outputs.version }}"

      - name: Verify CLI smoke test
        env:
          CI: "true"
        run: |
          set -euo pipefail
          /tmp/smoke/bin/nasde --version
          /tmp/smoke/bin/nasde --help

  smoke-test-pypi:
    name: Smoke-test fresh install from PyPI
    runs-on: ubuntu-latest
    needs: [build, publish-pypi]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Wait for PyPI index propagation
        run: sleep 30

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Fresh install from PyPI in clean venv
        run: |
          set -euo pipefail
          uv venv --python 3.12 /tmp/smoke
          VIRTUAL_ENV=/tmp/smoke uv pip install \
            --refresh \
            "nasde-toolkit==${{ needs.build.outputs.version }}"

      - name: Verify CLI smoke test
        env:
          CI: "true"
        run: |
          set -euo pipefail
          /tmp/smoke/bin/nasde --version
          /tmp/smoke/bin/nasde --help
