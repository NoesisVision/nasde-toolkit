[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "nasde-toolkit"
version = "0.1.0"
description = "Noesis Agentic Software Development Evals Toolkit"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
dependencies = [
    "typer>=0.15",
    "rich>=13.0",
    "platformdirs>=4.0",
    "harbor>=0.1.40,<0.2",
    "opik>=1.10,<2",
    "claude-code-sdk>=0.0.25,<1",
]

[project.scripts]
nasde = "nasde_toolkit.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/nasde_toolkit"]
