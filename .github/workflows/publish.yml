name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_to_prod:
        description: "Publish to production PyPI (default: TestPyPI only — safer dry-run)"
        type: boolean
        default: false
  schedule:
    # Weekly canary on Mondays 09:00 UTC. Re-publishes a fresh dev build
    # to TestPyPI and runs smoke-test-testpypi against it. Catches
    # transitive-dependency breakages (e.g. an upstream wheel going bad)
    # in the window between our own releases. Never reaches PyPI.
    - cron: "0 9 * * 1"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  quality-gate:
    name: Quality gate
    uses: ./.github/workflows/quality-gate.yml
    permissions:
      contents: read

  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
    outputs:
      version: ${{ steps.extract-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        run: uv build

      - name: Extract built version
        id: extract-version
        run: |
          set -euo pipefail
          wheel=$(ls dist/nasde_toolkit-*.whl)
          version=$(basename "$wheel" | sed -E 's/^nasde_toolkit-([^-]+)-.*\.whl$/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Built version: $version"

      - name: Verify built version matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          built_version="${{ steps.extract-version.outputs.version }}"
          if [ "$tag_version" != "$built_version" ]; then
            echo "::error::Tag $GITHUB_REF_NAME → expected version $tag_version, hatch-vcs produced $built_version"
            exit 1
          fi
          echo "Built version $built_version matches tag $GITHUB_REF_NAME"

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, smoke-test-testpypi]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_to_prod)
    environment:
      name: pypi
      url: https://pypi.org/project/nasde-toolkit/
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Verify tag is on main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Reject tag not reachable from main
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME (commit $GITHUB_SHA) is not reachable from main — refusing to publish to PyPI"
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME confirmed on main"

      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: testpypi
      url: https://test.pypi.org/project/nasde-toolkit/
    permissions:
      id-token: write
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  smoke-test-testpypi:
    name: Smoke-test fresh install from TestPyPI
    runs-on: ${{ matrix.os }}
    needs: [build, publish-testpypi]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13"]
    steps:
      - name: Wait for TestPyPI index propagation
        shell: bash
        run: sleep 30

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download nasde-toolkit wheel from TestPyPI
        shell: bash
        run: |
          set -euo pipefail
          # Why download the wheel manually instead of using `uv tool install`
          # against TestPyPI as an index?
          #
          # uv's `--index` resolution has a `first-index` dependency-confusion
          # guard that refuses to look at a fallback index once *any* package
          # of the same name exists on the primary one — even at the wrong
          # version. That blocks both indexing orders:
          #   - PyPI primary: blocks nasde-toolkit==X.Y.Z lookup on TestPyPI
          #     once an older nasde-toolkit exists on PyPI.
          #   - TestPyPI primary: blocks transitive deps (e.g. tensorlake==0.4.45,
          #     fastapi==0.128) lookup on PyPI when TestPyPI has unrelated
          #     devN/squatted uploads of those names.
          #
          # `--index-strategy unsafe-best-match` lifts the guard but introduces
          # a real squatting risk: TestPyPI has e.g. a 2.5KB stub `FASTAPI==1.0`
          # that uv would prefer to the legitimate fastapi==0.136.x on PyPI
          # because 1.0 > 0.136 numerically.
          #
          # The clean answer: download the freshly-published wheel directly
          # from TestPyPI's file-host, then install it as a local file. uv
          # then resolves transitive deps from PyPI only — no contact with
          # TestPyPI's resolver, no guard, no squatting attack surface.
          version="${{ needs.build.outputs.version }}"
          # jq is preinstalled on ubuntu-latest and windows-latest runners.
          wheel_url=$(curl -fsSL "https://test.pypi.org/pypi/nasde-toolkit/${version}/json" \
            | jq -r '.urls[] | select(.filename | endswith(".whl")) | .url')
          test -n "$wheel_url" || { echo "::error::No wheel URL found on TestPyPI for nasde-toolkit==${version}"; exit 1; }
          mkdir -p wheel
          curl -fsSL -o "wheel/$(basename "$wheel_url")" "$wheel_url"
          ls -la wheel/

      - name: Fresh install from TestPyPI wheel via uv tool install
        shell: bash
        run: |
          set -euo pipefail
          uv tool install \
            --python ${{ matrix.python }} \
            --refresh \
            wheel/nasde_toolkit-${{ needs.build.outputs.version }}-py3-none-any.whl

      - name: Verify CLI smoke test
        shell: bash
        env:
          CI: "true"
        run: |
          set -euo pipefail
          nasde --version
          nasde --help

  smoke-test-pypi:
    name: Smoke-test fresh install from PyPI
    runs-on: ${{ matrix.os }}
    needs: [build, publish-pypi]
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_to_prod)
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13"]
    steps:
      - name: Wait for PyPI index propagation
        shell: bash
        run: sleep 30

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Fresh install from PyPI via uv tool install
        shell: bash
        run: |
          set -euo pipefail
          uv tool install \
            --python ${{ matrix.python }} \
            --refresh \
            "nasde-toolkit==${{ needs.build.outputs.version }}"

      - name: Verify CLI smoke test
        shell: bash
        env:
          CI: "true"
        run: |
          set -euo pipefail
          nasde --version
          nasde --help
