[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sdlc-eval-kit"
version = "0.1.0"
description = "AI coding agent evaluation toolkit"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "typer>=0.15",
    "rich>=13.0",
    "platformdirs>=4.0",
]

[project.optional-dependencies]
harbor = ["harbor"]
opik = ["opik"]
eval = ["claude-code-sdk"]
all = ["harbor", "opik", "claude-code-sdk"]

[project.scripts]
sdlc-eval = "sdlc_eval_kit.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/sdlc_eval_kit"]
