name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  # github.workflow is the CALLER's workflow name ("Quality Gate" on a direct
  # push/PR, "Publish" when invoked via `uses:` from publish.yml). Keying the
  # group on it keeps the publish-embedded gate out of the standalone gate's
  # group, so the release push's gate isn't cancelled by the follow-up publish
  # run (which renders as a red ✗ on main even though nothing failed).
  # NOTE: this relies on each caller declaring an explicit `name:` — without one
  # GitHub falls back to the file path and the group silently changes.
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run mypy
        run: uv run mypy src/nasde_toolkit/

  test:
    name: Unit tests (pytest) — ${{ matrix.os }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  audit:
    name: CVE audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Export lockfile as requirements
        run: |
          uv export --no-dev --no-hashes --no-emit-project --format requirements-txt \
            > requirements.txt

      - name: Run pip-audit
        # PYSEC-2025-183 (CVE-2025-45768): disputed advisory against pyjwt — upstream
        # rejects the classification (key length is the application's responsibility),
        # there is no fix release (2.12.1 is latest), and pyjwt is only a transitive
        # dep via harbor → supabase-auth / mcp. Revisit if upstream ever ships a fix.
        run: uvx --with pip pip-audit -r requirements.txt --strict --ignore-vuln PYSEC-2025-183
