[project]
name = "ddd-architectural-challenges"
version = "1.0.0"

[defaults]
variant = "baseline"
model = "claude-sonnet-4-6"
timeout_sec = 720

[docker]
base_image = "mcr.microsoft.com/dotnet/sdk:8.0"
build_commands = [
    "dotnet restore MyCompany.ECommerce.sln",
    "dotnet build MyCompany.ECommerce.sln --configuration Debug --no-restore",
]

[evaluation]
model = "claude-sonnet-4-6"
dimensions_file = "assessment_dimensions.json"

[reporting]
platform = "opik"
project_name = "ddd-architectural-challenges"
